<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV MOST PRO - Duo Layout V.1.3.6</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --deep-pink: #ff007a; --neon-green: #39ff14; --deep-bg: #050505; 
            --btn-black: #121212; --glass-white: rgba(255, 255, 255, 0.1);
        }
        
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--deep-bg); color: white; font-family: 'Inter', sans-serif; }

        /* SABİT ÜST PANEL: Her zaman en üstte kalır */
        #header-fixed {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--deep-bg);
            z-index: 2000; /* Butonların üstüne çıkması için yüksek değer */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px 5px 15px;
            border-bottom: 1px solid var(--glass-white);
        }
        
        h1 { font-size: 1.5rem; font-weight: 900; margin: 5px 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--deep-pink); text-shadow: 0 0 10px var(--deep-pink); }

        .player-container { 
            width: 100%; max-width: 800px; border-radius: 12px; overflow: hidden; 
            background: #000; border: 1px solid var(--glass-white);
        }

        .status-bar { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.02); }

        .category-bar { display: flex; gap: 8px; width: 100%; max-width: 800px; margin: 8px 0; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .category-bar::-webkit-scrollbar { display: none; }
        
        .cat-btn { background: var(--btn-black); border: 1px solid #333; color: #888; padding: 7px 15px; border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
        .cat-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        /* KAYDIRILABİLİR İÇERİK: Üst panele çarpmaması için JS ile 'top' alacak */
        #scroll-content {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            padding: 10px 15px 80px 15px; /* Alt kısma footer için boşluk */
            z-index: 1000;
            -webkit-overflow-scrolling: touch;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 800px; margin: 0 auto; }
        
        .btn { background: var(--btn-black); border: 1.5px solid #333; color: #ddd; padding: 15px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; text-align: center; cursor: pointer; text-transform: uppercase; }
        .btn.active { background: linear-gradient(135deg, #ff007a 0%, #a600ff 100%) !important; border: 1.8px solid #fff !important; }

        .footer { width: 100%; text-align: center; padding: 40px 0; color: #444; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="header-fixed">
        <h1>MOST <span>PRO</span></h1>
        <div class="player-container">
            <video id="deepPlayer" playsinline controls></video>
        </div>
        <div class="status-bar">
            <span id="log" style="color: var(--neon-green);">SİSTEM HAZIR</span>
            <span style="color: #444;">DUO V.1.3.6</span>
        </div>
        <div class="category-bar" id="cat-nav"></div>
    </div>

    <div id="scroll-content">
        <div class="grid" id="channel-list"></div>
        <div class="footer">DESIGNED BY YÜKSEL • 2026</div>
    </div>

    <script>
        const header = document.getElementById('header-fixed');
        const scrollContent = document.getElementById('scroll-content');
        const video = document.getElementById('deepPlayer');
        const log = document.getElementById('log');
        let hls = null;

        // Player Kurulumu
        const player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });

        // ÖNEMLİ: Üst panelin boyu ne olursa olsun listeyi tam altına iter
        const fixLayout = () => {
            const headerHeight = header.offsetHeight;
            scrollContent.style.top = (headerHeight + 10) + "px"; // 10px nefes payı
        };

        const observer = new ResizeObserver(() => fixLayout());
        observer.observe(header);

        // Örnek Kanal Verisi (Senin kanallar.json dosyanı buraya bağlayacak)
        async function loadChannels() {
            try {
                const response = await fetch('kanallar.json');
                const kanallar = await response.json();
                renderCategories(kanallar);
                renderList(kanallar, 'HEPSİ');
            } catch (e) { log.innerText = "HATA: LİSTE YÜKLENEMEDİ"; }
        }

        function renderCategories(data) {
            const nav = document.getElementById('cat-nav');
            const cats = ['HEPSİ', ...new Set(data.map(k => k.cat.toUpperCase()))];
            nav.innerHTML = cats.map(c => `<div class="cat-btn ${c==='HEPSİ'?'active':''}" onclick="filter('${c}')">${c}</div>`).join('');
        }

        // Kategori filtreleme fonksiyonu buraya gelecek...
        // ... (Kendi renderList ve playCh fonksiyonlarını buraya ekleyebilirsin)

        window.onload = () => {
            loadChannels();
            fixLayout();
        };
    </script>
</body>
</html>
