<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOST PRO - CLEAN LOOK</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --deep-pink: #ff007a; --neon-green: #39ff14; --warning-yellow: #ffeb3b;
            --deep-bg: #050505; --btn-black: #121212; 
        }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background: var(--deep-bg); color: white; font-family: 'Inter', sans-serif;
        }

        /* --- ÜST KISIM --- */
        #fixed-header {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: auto;
            z-index: 999;
            background: var(--deep-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Alt kısımdaki çok koyu gri çizgiyi de istersen 0px yapabilirsin */
            border-bottom: 1px solid #1a1a1a; 
        }

        h1 { font-size: 1.4rem; font-weight: 900; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--deep-pink); text-shadow: 0 0 10px var(--deep-pink); }

        .player-container { 
            width: 100%; max-width: 800px; aspect-ratio: 16 / 9;
            background: #000; position: relative; 
            /* KIRMIZI ÇİZGİ BURADAN KALDIRILDI */
            border-bottom: none; 
        }

        .status-bar { 
            width: 100%; max-width: 800px; padding: 8px 15px; box-sizing: border-box;
            display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; 
            background: rgba(255,255,255,0.03);
        }

        .category-bar { 
            display: flex; gap: 8px; width: 100%; max-width: 800px;
            padding: 10px 15px; box-sizing: border-box; overflow-x: auto; 
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: var(--btn-black); border: 1px solid #333; color: #888; 
            padding: 8px 18px; border-radius: 20px; font-size: 10px; font-weight: 700; 
            cursor: pointer; white-space: nowrap; text-transform: uppercase;
        }
        .cat-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        /* --- ALT KISIM --- */
        #scroll-area {
            position: absolute;
            top: 360px; 
            bottom: 0; left: 0; right: 0;
            overflow-y: auto; 
            padding: 15px;
            -webkit-overflow-scrolling: touch;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 800px; margin: 0 auto; }
        .btn { 
            background: var(--btn-black); border: 1.5px solid #333; color: #ddd; 
            padding: 18px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; 
            text-align: center; cursor: pointer; text-transform: uppercase; 
        }
        .btn.active { background: linear-gradient(135deg, #ff007a 0%, #a600ff 100%) !important; border: 1.5px solid #fff !important; }

        .footer-text { text-align: center; padding: 40px 0; color: #aaaaaa; font-size: 10px; font-weight: 600; letter-spacing: 2px; }

        /* Loader & Gestures */
        #gesture-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); padding: 10px 20px; border-radius: 30px; display: none; z-index: 100; border: 1px solid var(--deep-pink); font-size: 12px; pointer-events: none;}
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 10; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--deep-pink); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="fixed-header">
        <h1>MOST <span>PRO</span></h1>
        
        <div class="player-container" id="touch-area">
            <div id="gesture-info"></div>
            <div id="loader"><div class="spinner"></div></div>
            <video id="deepPlayer" playsinline controls></video>
        </div>

        <div class="status-bar">
            <span id="log" style="color: var(--warning-yellow);">⚙️ BAĞLANILIYOR...</span>
            <span style="color: #444;">V.1.7.8 ABSOLUTE</span>
        </div>

        <div class="category-bar" id="cat-bar"></div>
    </div>

    <div id="scroll-area">
        <div id="channel-list" class="grid"></div>
        <div class="footer-text">DESIGNED BY YÜKSEL • 2026</div>
    </div>

    <script>
        const video = document.getElementById('deepPlayer');
        const log = document.getElementById('log');
        const loader = document.getElementById('loader');
        const touchArea = document.getElementById('touch-area');
        const gestureInfo = document.getElementById('gesture-info');
        const header = document.getElementById('fixed-header');
        const scrollArea = document.getElementById('scroll-area');
        
        let kanallar = [];
        let hls = null;

        const player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });

        function adjustLayout() {
            const h = header.offsetHeight;
            scrollArea.style.top = h + "px";
        }

        async function loadChannels() {
            try {
                const response = await fetch('kanallar.json');
                kanallar = await response.json();
                log.innerText = `✅ BAĞLANDI (${kanallar.length} KANAL)`;
                log.style.color = "#39ff14";
                createCategories();
                filterCat('hepsi');
                setTimeout(adjustLayout, 100); 
            } catch (e) {
                log.innerText = "❌ JSON HATASI!";
            }
        }

        function createCategories() {
            const catBar = document.getElementById('cat-bar');
            const cats = ['hepsi', ...new Set(kanallar.map(k => k.cat))];
            catBar.innerHTML = "";
            cats.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'cat-btn' + (c === 'hepsi' ? ' active' : '');
                btn.innerText = c.toUpperCase();
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterCat(c);
                };
                catBar.appendChild(btn);
            });
            adjustLayout();
        }

        function filterCat(cat) {
            const list = document.getElementById('channel-list');
            list.innerHTML = "";
            const filtered = (cat === 'hepsi') ? kanallar : kanallar.filter(c => c.cat === cat);
            filtered.forEach(ch => {
                const b = document.createElement('div');
                b.className = 'btn';
                b.innerText = ch.ad;
                b.onclick = () => playCh(ch.url, b, ch.ad);
                list.appendChild(b);
            });
            scrollArea.scrollTop = 0;
        }

        function playCh(url, el, name) {
            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            loader.style.display = "block";
            log.innerText = `⏳ ${name}...`;

            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    loader.style.display = "none";
                    log.innerText = `● CANLI: ${name}`;
                });
            }
        }

        window.addEventListener('resize', adjustLayout);
        loadChannels();
    </script>
</body>
</html>
