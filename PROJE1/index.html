<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV MOST PRO - Duo Layout V.1.3.6</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --deep-pink: #ff007a; --neon-green: #39ff14; --warning-yellow: #ffeb3b;
            --retry-orange: #ff9800; --error-red: #ff4d4d; --deep-bg: #050505; 
            --btn-black: #121212; --glass-white: rgba(255, 255, 255, 0.1);
        }
        
        /* Ekranın dışına taşmayı ve kaydırmayı kontrol altına alalım */
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--deep-bg); color: white; font-family: 'Inter', sans-serif; }

        /* ÜST PANEL: Sabit duracak ve butonların üstüne çıkmayacak */
        #top-section {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--deep-bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px 5px 15px;
            border-bottom: 1px solid var(--glass-white);
        }
        
        h1 { font-size: 1.5rem; font-weight: 900; margin: 5px 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--deep-pink); text-shadow: 0 0 10px var(--deep-pink); }

        .player-container { 
            width: 100%; max-width: 800px; border-radius: 12px; overflow: hidden; 
            background: #000; position: relative; border: 1px solid var(--glass-white);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 2; }
        
        .status-bar { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; font-size: 11px; font-weight: bold; background: rgba(255,255,255,0.02); }

        .category-bar { display: flex; gap: 8px; width: 100%; max-width: 800px; margin: 10px 0; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .category-bar::-webkit-scrollbar { display: none; }
        
        .cat-btn { background: var(--btn-black); border: 1px solid #333; color: #888; padding: 7px 15px; border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
        .cat-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        /* KAYDIRILABİLİR LİSTE: Üst panelin yüksekliğini JS ile alacak */
        #scroll-content {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            padding: 10px 15px 30px 15px;
            -webkit-overflow-scrolling: touch;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 800px; margin: 0 auto; }
        
        .btn { 
            background: var(--btn-black); border: 1.5px solid #333; color: #ddd; 
            padding: 15px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; 
            text-align: center; cursor: pointer; text-transform: uppercase; 
        }
        .btn.active { background: linear-gradient(135deg, #ff007a 0%, #a600ff 100%) !important; border: 1.8px solid #fff !important; }

        .footer { width: 100%; max-width: 800px; text-align: center; padding: 30px 0; color: #222; font-size: 9px; margin: 0 auto; }
    </style>
</head>
<body>

    <div id="top-section">
        <h1>MOST <span>PRO</span></h1>
        <div class="player-container" id="touch-area">
            <div id="brightness-overlay"></div>
            <div id="loader" style="position: absolute; top:50%; left:50%; transform:translate(-50%,-50%); display:none; z-index:10;"><div style="width:30px; height:30px; border:3px solid rgba(255,255,255,0.1); border-top:3px solid #ff007a; border-radius:50%; animation:spin 1s linear infinite;"></div></div>
            <video id="deepPlayer" playsinline controls></video>
        </div>
        <div class="status-bar">
            <span id="log" style="color: var(--neon-green);">SİSTEM HAZIR</span>
            <span style="color: #444;">DUO V.1.3.6</span>
        </div>
        <div class="category-bar" id="cat-nav"></div>
    </div>

    <div id="scroll-content">
        <div class="grid" id="channel-list"></div>
        <div class="footer">DESIGNED BY YÜKSEL • 2026</div>
    </div>

    <script>
        const video = document.getElementById('deepPlayer');
        const log = document.getElementById('log');
        const topSection = document.getElementById('top-section');
        const scrollContent = document.getElementById('scroll-content');
        
        let hls = null;

        const player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });

        // ÖNEMLİ: Üst panelin boyutu ne olursa olsun listeyi tam altına iter.
        const adjustLayout = () => {
            const h = topSection.offsetHeight;
            scrollContent.style.top = h + "px";
        };

        const resizeObserver = new ResizeObserver(() => adjustLayout());
        resizeObserver.observe(topSection);

        const kanallar = [
            { ad: "TRT 1", cat: "ulusal", url: "https://biraz.6781237.xyz/checklist/androstreamlivetrt1.m3u8" },
            { ad: "SHOW TV", cat: "ulusal", url: "http://65.108.239.207/showtv/index.m3u8" },
            { ad: "KANAL D", cat: "ulusal", url: "https://live.duhnet.tv/S2/HLS_LIVE/eurodnp/track_4_1000/playlist.m3u8" },
            { ad: "TV 8", cat: "ulusal", url: "https://biraz.6781237.xyz/checklist/androstreamlivetv8.m3u8" },
            { ad: "BEIN 1", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs1.m3u8" },
            { ad: "BEIN 2", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs2.m3u8" },
            { ad: "BEIN 3", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs3.m3u8" },
            { ad: "BEIN 4", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs4.m3u8" },
            { ad: "Tivibu 1", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivets1.m3u8" },
            { ad: "TRT SPOR", cat: "spor", url: "https://tv-trtspor1.medya.trt.com.tr/master.m3u8" },
            { ad: "TRT HABER", cat: "haber", url: "https://tv-trthaber.medya.trt.com.tr/master.m3u8" },
            { ad: "A HABER", cat: "haber", url: "https://turkuvaz-live.daioncdn.net/ahaber/ahaber.m3u8" },
            { ad: "SİNEMA ACT", cat: "sinema", url: "https://dsmartgo-live.ercdn.net/sinemaaksiyon2/sinemaaksiyon2_1080p.m3u8" },
            { ad: "BNT 1", cat: "BG TV", url: "https://bg-dvr-canli.efomost2.workers.dev/1932" }
        ];

        function createCategories() {
            const nav = document.getElementById('cat-nav');
            const cats = ['HEPSİ', ...new Set(kanallar.map(k => k.cat.toUpperCase()))];
            nav.innerHTML = cats.map(c => `<div class="cat-btn ${c === 'HEPSİ' ? 'active' : ''}" onclick="filterCat('${c.toLowerCase()}', this)">${c}</div>`).join('');
        }

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
            const list = document.getElementById('channel-list');
            list.innerHTML = "";
            const filtered = cat === 'hepsi' ? kanallar : kanallar.filter(c => c.cat.toLowerCase() === cat);
            filtered.forEach(ch => {
                const b = document.createElement('div');
                b.className = 'btn';
                b.innerText = ch.ad;
                b.onclick = () => playCh(ch.url, b, ch.ad);
                list.appendChild(b);
            });
            scrollContent.scrollTop = 0;
        }

        function playCh(url, el, name) {
            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            log.innerText = "⏳ BAĞLANILIYOR...";
            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    log.innerText = "✅ CANLI: " + name;
                });
            }
        }

        window.onload = () => {
            createCategories();
            filterCat('hepsi', document.querySelector('.cat-btn'));
            adjustLayout();
        };
    </script>
</body>
</html>
