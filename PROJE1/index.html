<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOST PRO V.1.3.6</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --pink: #ff007a; --green: #39ff14; --bg: #050505; --btn: #121212; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #header { flex-shrink: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #222; }
        h1 { margin: 5px 0; font-size: 1.4rem; text-transform: uppercase; }
        h1 span { color: var(--pink); }

        .player-container { width: 100%; max-width: 600px; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
        .status { width: 100%; max-width: 600px; display: flex; justify-content: space-between; padding: 5px 10px; font-size: 10px; font-weight: bold; color: var(--green); }

        .cats { display: flex; gap: 8px; width: 100%; max-width: 600px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cats::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--btn); border: 1px solid #333; color: #888; padding: 6px 12px; border-radius: 20px; font-size: 10px; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { border-color: var(--green); color: var(--green); }

        #list-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px; margin: 0 auto; }
        .btn { background: var(--btn); border: 1px solid #333; color: #ccc; padding: 15px 5px; border-radius: 10px; font-size: 11px; text-align: center; font-weight: bold; cursor: pointer; }
        .btn.active { background: linear-gradient(135deg, var(--pink), #a600ff); border-color: #fff; color: #fff; }

        .footer-text { text-align: center; padding: 20px; font-size: 10px; color: #444; font-weight: bold; }

        /* YATAY MOD DÜZELTMESİ: Resimdeki tam kaplamama sorununu çözer */
        @media screen and (orientation: landscape) {
            #header h1, .status, .cats, .footer-text { display: none !important; }
            #list-area { display: none; }
            #header { border: none; padding: 0; }
            .player-container { max-width: 100% !important; width: 100vw !important; height: 100vh !important; aspect-ratio: auto !important; border-radius: 0; }
            body { justify-content: center; }
        }
    </style>
</head>
<body>

<div id="header">
    <h1>MOST <span>PRO</span></h1>
    <div class="player-container"><video id="video" playsinline controls></video></div>
    <div class="status"><span id="log">SİSTEM HAZIR</span><span>V.1.3.6</span></div>
    <div id="cat-nav" class="cats"></div>
</div>

<div id="list-area">
    <div id="channel-list" class="grid"></div>
    <div class="footer-text">DESIGNED BY YÜKSEL • 2026</div>
</div>

<script>
    let kanallar = [];
    const video = document.getElementById('video');
    const log = document.getElementById('log');
    const player = new Plyr(video, { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });
    let hls = null;

    async function yukle() {
        try {
            const res = await fetch('kanallar.json');
            kanallar = await res.json();
            init();
        } catch (e) {
            log.innerText = "VERİ ALINAMADI!";
        }
    }

    function init() {
        if (!kanallar.length) return;
        const uniqueCats = [...new Set(kanallar.map(k => k.cat.trim().toUpperCase()))];
        const categories = ['HEPSİ', ...uniqueCats];
        
        document.getElementById('cat-nav').innerHTML = categories.map((c, i) => 
            `<div class="cat-btn ${i===0?'active':''}" onclick="filtrele('${c}', this)">${c}</div>`
        ).join('');

        // Filtrelemeyi garantiye almak için kısa bir gecikme
        setTimeout(() => { filtrele('HEPSİ'); }, 100);
    }

    function filtrele(cat, el) {
        if(el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        const list = document.getElementById('channel-list');
        list.innerHTML = "";
        const aranan = cat.toUpperCase().trim();
        const f = aranan === 'HEPSİ' ? kanallar : kanallar.filter(k => k.cat.trim().toUpperCase() === aranan);

        f.forEach(ch => {
            const b = document.createElement('div');
            b.className = 'btn'; b.innerText = ch.ad;
            b.onclick = () => oynat(ch.url, b, ch.ad);
            list.appendChild(b);
        });
    }

    function oynat(url, el, ad) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        log.innerText = "YÜKLENİYOR: " + ad;
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play(); log.innerText = "CANLI: " + ad; });
        }
    }

    window.onload = yukle;
</script>
</body>
</html>
