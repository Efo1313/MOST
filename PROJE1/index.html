<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOST PRO - V.1.7.6 FIXED</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --deep-pink: #ff007a; --neon-green: #39ff14; --warning-yellow: #ffeb3b;
            --error-red: #ff4d4d; --deep-bg: #050505; --btn-black: #121212; 
        }
        
        /* Ekranın dışarı taşmasını ve sayfanın genel kaymasını tamamen kapatıyoruz */
        html, body { 
            height: 100vh; margin: 0; padding: 0; overflow: hidden; 
            background: var(--deep-bg); color: white; font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
        }

        /* --- ÜST SABİT PANEL (Logo, Player, Gruplar) --- */
        header {
            flex-shrink: 0; /* Yukarı doğru daralmasını engeller */
            width: 100%;
            z-index: 1000;
            background: var(--deep-bg);
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        h1 { font-size: 1.5rem; font-weight: 900; margin: 10px 0; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--deep-pink); text-shadow: 0 0 10px var(--deep-pink); }

        .player-container { 
            width: 100%; max-width: 800px; aspect-ratio: 16 / 9; margin: 0 auto;
            background: #000; position: relative; border-bottom: 2px solid var(--deep-pink);
            touch-action: none; /* Player üzerinde sayfa kaymasını engeller */
        }

        .status-bar { 
            width: 100%; max-width: 800px; margin: 0 auto; padding: 8px 15px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center; 
            font-size: 10px; font-weight: bold; background: rgba(255,255,255,0.03);
        }

        .category-bar { 
            display: flex; gap: 8px; width: 100%; max-width: 800px; margin: 0 auto;
            padding: 10px 15px; box-sizing: border-box; overflow-x: auto; 
            scrollbar-width: none;
        }
        .category-bar::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: var(--btn-black); border: 1px solid #333; color: #888; 
            padding: 8px 18px; border-radius: 20px; font-size: 10px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; white-space: nowrap; text-transform: uppercase;
        }
        .cat-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        /* --- KAYDIRILABİLİR ALAN (Sadece burası hareket eder) --- */
        main {
            flex-grow: 1; /* Kalan tüm boşluğu doldurur */
            width: 100%; max-width: 800px; align-self: center;
            overflow-y: auto; /* Dikey kaydırmayı açar */
            padding: 15px; box-sizing: border-box;
            -webkit-overflow-scrolling: touch; /* Mobilde yağ gibi akması için */
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .btn { 
            background: var(--btn-black); border: 1.5px solid #333; color: #ddd; 
            padding: 18px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; 
            text-align: center; cursor: pointer; transition: 0.2s; text-transform: uppercase; 
        }
        .btn.active { background: linear-gradient(135deg, #ff007a 0%, #a600ff 100%) !important; border: 1.5px solid #fff !important; }

        .footer-text { text-align: center; padding: 30px; color: #aaaaaa; font-size: 10px; font-weight: 600; letter-spacing: 2px; }

        /* JESTLER & LOADER */
        #brightness-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; opacity: 0; pointer-events: none; z-index: 2; }
        #gesture-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 30px; display: none; z-index: 100; border: 1.5px solid var(--deep-pink); font-size: 13px; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 10; }
        .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--deep-pink); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>MOST <span>PRO</span></h1>
        <div class="player-container" id="touch-area">
            <div id="brightness-overlay"></div>
            <div id="gesture-info"></div>
            <div id="loader"><div class="spinner"></div></div>
            <video id="deepPlayer" playsinline controls></video>
        </div>
        <div class="status-bar">
            <span id="log" style="color: var(--warning-yellow);">⚙️ BAŞLATILIYOR...</span>
            <span style="color: #444;">FIXED PRO V1.7.6</span>
        </div>
        <div class="category-bar" id="cat-bar"></div>
    </header>

    <main id="main-scroll">
        <div id="channel-list" class="grid"></div>
        <div class="footer-text">DESIGNED BY YÜKSEL • 2026</div>
    </main>

    <script>
        const video = document.getElementById('deepPlayer');
        const log = document.getElementById('log');
        const loader = document.getElementById('loader');
        const touchArea = document.getElementById('touch-area');
        const gestureInfo = document.getElementById('gesture-info');
        const brightnessOverlay = document.getElementById('brightness-overlay');
        
        let kanallar = [];
        let hls = null;
        let startY, startVal, isRightSide, currentBrightness = 0;

        const player = new Plyr(video, { 
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] 
        });

        async function loadChannels() {
            try {
                const response = await fetch('kanallar.json');
                if (!response.ok) throw new Error();
                kanallar = await response.json();
                log.innerText = `✅ SİSTEM HAZIR (${kanallar.length} KANAL)`;
                log.style.color = "#39ff14";
                createCategories();
                filterCat('hepsi');
            } catch (e) {
                log.innerText = "❌ JSON DOSYASI OKUNAMADI!";
                log.style.color = "#ff4d4d";
            }
        }

        touchArea.addEventListener('touchstart', e => {
            startY = e.touches[0].pageY;
            isRightSide = e.touches[0].pageX > touchArea.offsetWidth / 2;
            startVal = isRightSide ? player.volume * 100 : (1 - currentBrightness) * 100;
        });

        touchArea.addEventListener('touchmove', e => {
            const deltaY = startY - e.touches[0].pageY;
            let newVal = Math.min(Math.max(startVal + (deltaY * 0.6), 0), 100);
            gestureInfo.style.display = 'block';
            if (isRightSide) {
                player.volume = newVal / 100;
                gestureInfo.innerHTML = `🔊 Ses: %${Math.round(newVal)}`;
            } else {
                currentBrightness = 1 - (newVal / 100);
                brightnessOverlay.style.opacity = currentBrightness;
                gestureInfo.innerHTML = `🔆 Parlaklık: %${Math.round(newVal)}`;
            }
        });

        touchArea.addEventListener('touchend', () => { setTimeout(() => gestureInfo.style.display = 'none', 600); });

        function createCategories() {
            const catBar = document.getElementById('cat-bar');
            const cats = ['hepsi', ...new Set(kanallar.map(k => k.cat))];
            catBar.innerHTML = "";
            cats.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'cat-btn' + (c === 'hepsi' ? ' active' : '');
                btn.innerText = c.toUpperCase();
                btn.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterCat(c);
                };
                catBar.appendChild(btn);
            });
        }

        function filterCat(cat) {
            const list = document.getElementById('channel-list');
            list.innerHTML = "";
            const filtered = (cat === 'hepsi') ? kanallar : kanallar.filter(c => c.cat === cat);
            filtered.forEach(ch => {
                const b = document.createElement('div');
                b.className = 'btn';
                b.innerText = ch.ad;
                b.onclick = () => playCh(ch.url, b, ch.ad);
                list.appendChild(b);
            });
            document.getElementById('main-scroll').scrollTop = 0;
        }

        function playCh(url, el, name) {
            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            loader.style.display = "block";
            log.style.color = "var(--warning-yellow)";
            log.innerText = `⏳ ${name} açılıyor...`;

            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls({ manifestLoadingMaxRetry: 2 });
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    loader.style.display = "none";
                    log.style.color = "#39ff14";
                    log.innerText = `● CANLI: ${name}`;
                });
                hls.on(Hls.Events.ERROR, (e, d) => {
                    if (d.fatal) {
                        loader.style.display = "none";
                        log.style.color = "#ff4d4d";
                        log.innerText = "❌ YAYIN HATASI!";
                        hls.destroy();
                    }
                });
            } else {
                video.src = url;
                video.play();
                loader.style.display = "none";
            }
        }

        loadChannels();
    </script>
</body>
</html>
