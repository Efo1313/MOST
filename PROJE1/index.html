<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOST PRO V.1.3.6</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --pink: #ff007a; --green: #39ff14; --bg: #050505; --btn: #121212; }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }
        
        /* ÜST PANEL */
        #header { 
            padding: 5px 10px 0 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border-bottom: 1px solid #222; 
            z-index: 100; 
            flex-shrink: 0;
        }
        
        h1 { margin: 5px 0; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; }
        h1 span { color: var(--pink); }

        .player-container { 
            width: 100%; 
            max-width: 600px; 
            border-radius: 8px; 
            overflow: hidden; 
            background: #000; 
            aspect-ratio: 16/9; 
        }
        
        .status { 
            width: 100%; 
            max-width: 600px; 
            display: flex; 
            justify-content: space-between; 
            padding: 5px 10px; 
            font-size: 10px; 
            font-weight: bold; 
            color: var(--green); 
        }

        .cats { 
            display: flex; 
            gap: 8px; 
            width: 100%; 
            max-width: 600px; 
            overflow-x: auto; 
            padding: 10px 0; 
            scrollbar-width: none; 
        }
        .cats::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: var(--btn); 
            border: 1px solid #333; 
            color: #888; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 10px; 
            white-space: nowrap; 
            cursor: pointer; 
            transition: 0.3s; 
            font-weight: bold;
        }
        .cat-btn.active { 
            border-color: var(--green); 
            color: var(--green); 
            background: rgba(57, 255, 20, 0.1); 
        }

        /* KAYDIRILABİLİR LİSTE ALANI */
        #list-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            max-width: 600px; 
            margin: 0 auto; 
            padding-bottom: 20px;
        }
        
        .btn { 
            background: var(--btn); 
            border: 1px solid #333; 
            color: #ccc; 
            padding: 15px 5px; 
            border-radius: 10px; 
            font-size: 11px; 
            text-align: center; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.2s; 
            min-height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .btn:active { transform: scale(0.95); }
        .btn.active { 
            background: linear-gradient(135deg, var(--pink), #a600ff); 
            border-color: #fff; 
            color: #fff; 
            box-shadow: 0 0 15px rgba(255, 0, 122, 0.4); 
        }

        /* ALT İMZA PANELİ */
        #footer { 
            text-align: center; 
            padding: 10px; 
            font-size: 10px; 
            color: #444; 
            background: #080808; 
            border-top: 1px solid #111; 
            letter-spacing: 1px; 
            font-weight: bold; 
            flex-shrink: 0;
        }
        #footer span { color: var(--pink); }
    </style>
</head>
<body>

<div id="header">
    <h1>MOST <span>PRO</span></h1>
    <div class="player-container"><video id="video" playsinline controls></video></div>
    <div class="status"><span id="log">SİSTEM HAZIR</span><span>V.1.3.6</span></div>
    <div id="cat-nav" class="cats"></div>
</div>

<div id="list-area">
    <div id="channel-list" class="grid"></div>
</div>

<div id="footer">
    DESIGNED BY <span>YÜKSEL</span> • 2026
</div>

<script>
    let kanallar = [];
    const video = document.getElementById('video');
    const log = document.getElementById('log');
    const player = new Plyr(video, { controls: ['play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });
    let hls = null;

    // JSON VERİSİNİ ÇEK
    async function yukle() {
        try {
            const res = await fetch('kanallar.json');
            if (!res.ok) throw new Error("JSON dosyası bulunamadı!");
            kanallar = await res.json();
            init();
        } catch (e) {
            log.innerText = "HATA: " + e.message;
            log.style.color = "red";
        }
    }

    // ARAYÜZÜ HAZIRLA
    function init() {
        // Kategorileri temizle ve "HEPSİ" seçeneğini başa ekle
        const uniqueCats = [...new Set(kanallar.map(k => k.cat.trim().toUpperCase()))];
        const categories = ['HEPSİ', ...uniqueCats];
        
        const nav = document.getElementById('cat-nav');
        nav.innerHTML = categories.map((c, index) => 
            `<div class="cat-btn ${index === 0 ? 'active' : ''}" onclick="filtrele('${c}', this)">${c}</div>`
        ).join('');

        // Uygulama açıldığında HEPSİ kategorisini göster
        filtrele('HEPSİ');
    }

    // FİLTRELEME SİSTEMİ
    function filtrele(cat, el) {
        if(el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        const list = document.getElementById('channel-list');
        list.innerHTML = "";
        
        const aranan = cat.trim().toUpperCase();
        
        // Mantık: 'HEPSİ' ise tüm listeyi getir, değilse kategoriye göre filtrele
        const f = aranan === 'HEPSİ' 
            ? kanallar 
            : kanallar.filter(k => k.cat.trim().toUpperCase() === aranan);

        if (f.length === 0) {
            list.innerHTML = "<div style='grid-column: 1/-1; text-align:center; color:#555; padding-top:20px;'>Kanal bulunamadı.</div>";
        }

        f.forEach(ch => {
            const b = document.createElement('div');
            b.className = 'btn'; 
            b.innerText = ch.ad;
            b.onclick = () => oynat(ch.url, b, ch.ad);
            list.appendChild(b);
        });
        
        // Liste her değiştiğinde yukarı kaydır
        document.getElementById('list-area').scrollTop = 0;
    }

    // OYNATICI SİSTEMİ
    function oynat(url, el, ad) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        log.innerText = "YÜKLENİYOR: " + ad;
        
        if (hls) hls.destroy();
        
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => { 
                video.play(); 
                log.innerText = "CANLI: " + ad; 
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) log.innerText = "YAYIN HATASI!";
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                video.play();
                log.innerText = "CANLI: " + ad;
            });
        }
    }

    window.onload = yukle;
</script>
</body>
</html>
