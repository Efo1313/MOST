<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV MOST PRO - Duo Layout V.1.3.6</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --deep-pink: #ff007a; --neon-green: #39ff14; --warning-yellow: #ffeb3b;
            --retry-orange: #ff9800; --error-red: #ff4d4d; --deep-bg: #050505; 
            --btn-black: #121212; --glass-white: rgba(255, 255, 255, 0.1);
        }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; 
            overflow: hidden; background: var(--deep-bg); 
            color: white; font-family: 'Inter', sans-serif; 
        }

        /* ÜST PANEL: Sabit duracak ve alt tarafı itecek */
        #header-fixed {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: var(--deep-bg);
            z-index: 2000; /* Daha yüksek katman */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px 5px 15px;
            border-bottom: 1px solid var(--glass-white);
        }
        
        h1 { font-size: 1.5rem; font-weight: 900; margin: 5px 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--deep-pink); text-shadow: 0 0 10px var(--deep-pink); }

        .player-container { 
            width: 100%; max-width: 800px; border-radius: 12px; overflow: hidden; 
            background: #000; position: relative; border: 1px solid var(--glass-white);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .status-bar { 
            width: 100%; max-width: 800px; display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 8px 10px; font-size: 11px; font-weight: bold; 
            background: rgba(255,255,255,0.02); box-sizing: border-box; 
        }

        .category-bar { 
            display: flex; gap: 8px; width: 100%; max-width: 800px; 
            margin: 8px 0; overflow-x: auto; padding-bottom: 5px; 
            scrollbar-width: none; 
        }
        .category-bar::-webkit-scrollbar { display: none; }
        
        .cat-btn { 
            background: var(--btn-black); border: 1px solid #333; 
            color: #888; padding: 7px 15px; border-radius: 20px; 
            font-size: 10px; font-weight: 700; cursor: pointer; 
            white-space: nowrap; text-transform: uppercase; 
        }
        .cat-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        /* KAYDIRILABİLİR LİSTE: Üst panelin altında temizce duracak */
        #scroll-content {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            padding: 20px 15px 100px 15px; /* Alt boşluk eklendi (footer için) */
            z-index: 1000;
            -webkit-overflow-scrolling: touch;
            transition: top 0.2s ease-out;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; width: 100%; max-width: 800px; 
            margin: 0 auto; 
        }
        
        .btn { 
            background: var(--btn-black); border: 1.5px solid #333; 
            color: #ddd; padding: 15px 10px; border-radius: 12px; 
            font-size: 11px; font-weight: 700; text-align: center; 
            cursor: pointer; text-transform: uppercase; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn.active { 
            background: linear-gradient(135deg, #ff007a 0%, #a600ff 100%) !important; 
            border: 1.8px solid #fff !important; 
            box-shadow: 0 0 15px rgba(255, 0, 122, 0.4);
        }

        .footer { width: 100%; max-width: 800px; text-align: center; padding: 40px 0; color: #333; font-size: 10px; margin: 0 auto; font-weight: bold; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="header-fixed">
        <h1>MOST <span>PRO</span></h1>
        <div class="player-container">
            <video id="deepPlayer" playsinline controls></video>
        </div>
        <div class="status-bar">
            <span id="log" style="color: var(--neon-green);">SİSTEM HAZIR</span>
            <span style="color: #444;">DUO V.1.3.6</span>
        </div>
        <div class="category-bar" id="cat-nav"></div>
    </div>

    <div id="scroll-content">
        <div class="grid" id="channel-list"></div>
        <div class="footer">DESIGNED BY YÜKSEL • 2026</div>
    </div>

    <script>
        const video = document.getElementById('deepPlayer');
        const log = document.getElementById('log');
        const header = document.getElementById('header-fixed');
        const scrollContent = document.getElementById('scroll-content');
        let kanallar = [];
        let hls = null;

        const player = new Plyr(video, { 
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
            tooltips: { controls: true, seek: true }
        });

        // DÜZELTME: Üst panelin yüksekliğini milimetrik hesaplayıp alt listeyi tam yerinde iten yapı
        const updateLayout = () => {
            const h = header.offsetHeight;
            scrollContent.style.top = (h + 5) + "px"; // 5px emniyet boşluğu
        };

        const resizeObserver = new ResizeObserver(() => updateLayout());
        resizeObserver.observe(header);

        async function fetchChannels() {
            try {
                // Not: kanallar.json dosyasının aynı dizinde olduğundan emin ol
                const response = await fetch('kanallar.json');
                kanallar = await response.json();
                createCategories();
                filterCat('HEPSİ');
                updateLayout(); // Kanallar gelince yerleşimi tazele
            } catch (error) { 
                log.innerText = "LİSTE HATASI!"; 
                console.error("JSON Hatası:", error);
            }
        }

        function createCategories() {
            const nav = document.getElementById('cat-nav');
            const cats = ['HEPSİ', ...new Set(kanallar.map(k => k.cat.toUpperCase()))];
            nav.innerHTML = "";
            cats.forEach(c => {
                const b = document.createElement('div');
                b.className = `cat-btn ${c === 'HEPSİ' ? 'active' : ''}`;
                b.innerText = c;
                b.onclick = () => {
                    document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    filterCat(c);
                };
                nav.appendChild(b);
            });
        }

        function filterCat(cat) {
            const list = document.getElementById('channel-list');
            list.innerHTML = "";
            const filtered = cat === 'HEPSİ' ? kanallar : kanallar.filter(k => k.cat.toUpperCase() === cat);
            filtered.forEach(ch => {
                const b = document.createElement('div');
                b.className = 'btn';
                b.innerText = ch.ad;
                b.onclick = () => playCh(ch.url, b, ch.ad);
                list.appendChild(b);
            });
            scrollContent.scrollTop = 0;
        }

        function playCh(url, el, name) {
            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            log.innerText = "⏳ BAĞLANILIYOR...";
            
            if (hls) hls.destroy();

            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => log.innerText = "OYNATMA BAŞLATILAMADI");
                    log.innerText = "✅ " + name;
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) log.innerText = "❌ YAYIN HATASI!";
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // iOS cihazlar için yerel HLS desteği
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    log.innerText = "✅ " + name;
                });
            }
        }

        window.onload = fetchChannels;
        window.onresize = updateLayout; // Ekran dönerse yerleşimi güncelle
    </script>
</body>
</html>
