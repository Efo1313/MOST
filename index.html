<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h1 { color: #ff4d94; font-size: 2rem; margin-bottom: 10px; }
        .player-container { width: 95%; max-width: 500px; border: 2px solid #ff4d94; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; }
        .status { width: 95%; max-width: 500px; font-size: 12px; color: #8b949e; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95%; max-width: 500px; }
        .btn { background: #161b22; border: 1px solid #30363d; color: white; padding: 15px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; text-align: center; cursor: pointer; }
        .btn.active { background: #ff4d94; border-color: #ff4d94; box-shadow: 0 0 10px #ff4d94; }
    </style>
</head>
<body>

    <h1>PREMIUM TV</h1>

    <div class="player-container">
        <video id="video" controls playsinline></video>
    </div>

    <div class="status" id="log">Sistem kontrol ediliyor...</div>

    <div class="grid">
        <div class="btn active" onclick="play('patron', this)">BEIN SPORTS 1</div>
        <div class="btn" onclick="play('b2', this)">BEIN SPORTS 2</div>
        <div class="btn" onclick="play('ss', this)">S SPORT</div>
        <div class="btn" onclick="play('ex1', this)">EXXEN SPOR</div>
        <div class="btn" onclick="play('t1', this)">TIVIBU SPOR</div>
        <div class="btn" onclick="play('la1', this)">LAÇS EEE</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const log = document.getElementById('log');
        let hls = new Hls();

        async function play(id, el) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            
            try {
                // Domaini dinamik çekmeyi deneyelim
                const res = await fetch('https://patronsports1.cfd/domain.php');
                const domain = (await res.text()).trim();
                const url = `${domain}/${id}/mono.m3u8`;
                
                log.innerText = "Yükleniyor: " + url;

                if (Hls.isSupported()) {
                    hls.destroy();
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => log.innerText = "Oynatma başlatılamadı."));
                }
            } catch (err) {
                log.innerText = "Bağlantı Hatası: Link ölmüş olabilir.";
            }
        }

        // Sayfa yüklenince ilk butona bas
        window.onload = () => document.querySelector('.btn').click();
    </script>
</body>
</html>
