<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV MOST PRO - Black & White Border Edition</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root { 
            --deep-pink: #ff007a; 
            --neon-green: #39ff14; 
            --error-red: #ff3333;
            --deep-bg: #050505; 
            --btn-black: #121212; /* Butonların siyah tonu */
            --plyr-color-main: var(--deep-pink);
        }
        
        body { background: var(--deep-bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        h1 { color: white; font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        h1 span { color: var(--deep-pink); }

        .player-container { 
            width: 100%; max-width: 640px; border-radius: 20px; overflow: hidden; 
            background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .status-bar { width: 100%; max-width: 640px; display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; font-size: 13px; font-weight: bold; }

        .category-bar { display: flex; gap: 8px; width: 100%; max-width: 640px; margin: 15px 0; overflow-x: auto; padding-bottom: 8px; }
        
        .cat-btn {
            background: var(--btn-black); 
            border: 1.5px solid #ffffff; /* Kategori butonları beyaz çerçeveli */
            color: #ffffff; 
            padding: 10px 18px;
            border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { border-color: var(--neon-green); color: var(--neon-green); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 640px; }
        
        /* SİYAH BUTONLAR & BEYAZ ÇERÇEVE */
        .btn { 
            background: var(--btn-black) !important; /* Buton Siyah Kalacak */
            border: 1.5px solid #ffffff !important; /* Çerçevesi Beyaz Olacak */
            color: #ffffff !important; 
            padding: 22px 5px; border-radius: 15px; font-size: 11px; font-weight: 800; 
            text-align: center; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }

        /* PEMBE AKTİF BUTON (Daha Kalın Beyaz Çerçeve ve Parlama) */
        .btn.active { 
            background: linear-gradient(135deg, #ff007a 0%, #a600ff 100%) !important; 
            border: 4px solid #ffffff !important; /* Kalın Beyaz Çerçeve */
            box-shadow: 0 0 25px rgba(255, 0, 122, 0.7); 
            transform: scale(1.05);
        }

        .footer { width: 100%; max-width: 640px; text-align: right; padding: 20px 0; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <h1>MOST <span>PRO</span></h1>

    <div class="player-container">
        <video id="deepPlayer" playsinline controls></video>
    </div>

    <div class="status-bar">
        <span id="log" style="color: var(--neon-green);">SİSTEM HAZIR</span>
        <span style="color: #444;">DEEP V.1.0</span>
    </div>

    <div class="category-bar">
        <div class="cat-btn" onclick="filterCat('hepsi', this)">HEPSİ</div>
        <div class="cat-btn active" onclick="filterCat('haber', this)">HABER</div>
        <div class="cat-btn" onclick="filterCat('ulusal', this)">ULUSAL</div>
        <div class="cat-btn" onclick="filterCat('spor', this)">SPOR</div>
        <div class="cat-btn" onclick="filterCat('belgesel', this)">BELGESEL</div>
        <div class="cat-btn" onclick="filterCat('hepsi', this)">SİNEMA</div>
    </div>

    <div class="grid" id="channel-list"></div>

    <div class="footer">YÜKSEL</div>

    <script>
        const video = document.getElementById('deepPlayer');
        const log = document.getElementById('log');
        let hls = null;
        const player = new Plyr(video, { controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'] });

        const kanallar = [
            { ad: "TRT 1", cat: "ulusal", url: "https://biraz.6781237.xyz/checklist/androstreamlivetrt1.m3u8" },
            { ad: "SHOW TV", cat: "ulusal", url: "http://65.108.239.207/showtv/index.m3u8" },
            { ad: "KANAL D", cat: "ulusal", url: "https://live.duhnet.tv/S2/HLS_LIVE/eurodnp/track_4_1000/playlist.m3u8" },
            { ad: "TV 8", cat: "ulusal", url: "https://biraz.6781237.xyz/checklist/androstreamlivetv8.m3u8" },
            { ad: "BEIN 1", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs1.m3u8" },
            { ad: "BEIN 2", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs2.m3u8" },
            { ad: "BEIN 3", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs3.m3u8" },
            { ad: "BEIN 4", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs4.m3u8" },
            { ad: "BEIN 5", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivebs5.m3u8" },
            { ad: "Tivibu 1", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivets1.m3u8" },
            { ad: "Tivibu 2", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivets2.m3u8" },
            { ad: "Tivibu 3", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivets3.m3u8" },
            { ad: "Tivibu 4", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivets4.m3u8" },
            { ad: "TABİ SPOR", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetb.m3u8" },
            { ad: "TABİ SPOR 1", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetb1.m3u8" },
            { ad: "TABİ SPOR 2", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetb2.m3u8" },
            { ad: "TABİ SPOR 3", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetb3.m3u8" },
            { ad: "TABİ SPOR 4", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetb4.m3u8" },
            { ad: "TRT SPOR", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetrts.m3u8" },
            { ad: "TABİ SPOR 5", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetb5.m3u8" },
            { ad: "TRT SPOR🌟 ", cat: "spor", url: "https://biraz.6781237.xyz/checklist/androstreamlivetrtsy.m3u8" },
            { ad: "TRT HABER", cat: "haber", url: "https://tv-trthaber.medya.trt.com.tr/master.m3u8" },
            { ad: "A HABER", cat: "haber", url: "https://turkuvaz-live.daioncdn.net/ahaber/ahaber.m3u8" },
            { ad: "SİNEMA", cat: "sinema", url: "https://dsmartgo-live.ercdn.net/sinemaaksiyon2/sinemaaksiyon2_1080p.m3u8" },
            { ad: "BELGESEL 1", cat: "belgesel", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        function filterCat(cat, el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            const list = document.getElementById('channel-list');
            list.innerHTML = "";
            const filtered = cat === 'hepsi' ? kanallar : kanallar.filter(c => c.cat === cat);
            filtered.forEach(ch => {
                const b = document.createElement('div');
                b.className = 'btn';
                b.innerText = ch.ad;
                b.onclick = () => playCh(ch.url, b, ch.ad);
                list.appendChild(b);
            });
        }

        function playCh(url, el, name) {
            document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            log.style.color = "var(--neon-green)";
            log.innerText = "CANLI: " + name;

            if (hls) hls.destroy();
            if (Hls.isSupported()) {
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
        }
        window.onload = () => filterCat('hepsi', document.querySelector('.cat-btn'));
    </script>
</body>
</html>
